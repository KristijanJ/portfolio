name: Deploy
run-name: ${{ github.actor }} is deploying frontend 🚀
on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  Deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Configure AWS Credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          role-to-assume: ${{ vars.OIDC_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Upload to S3
        uses: shallwefootball/s3-upload-action@v1.3.3
        with:
          source_dir: dist/
          aws_bucket: jovanovski.dev

      # - name: Invalidate CloudFront
      #   run: aws cloudfront create-invalidation --distribution-id ${{ vars.CLOUDFRONT_DIST_ID }} --paths "/*"
