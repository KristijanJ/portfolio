name: Rollback
run-name: ${{ github.actor }} is rolling back frontend 🚀
on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA to rollback to"
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  Rollback:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.commit_sha }}

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Configure AWS Credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          role-to-assume: ${{ vars.OIDC_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Upload to S3
        run: aws s3 sync dist/ s3://jovanovski.dev --delete

      # - name: Invalidate CloudFront
      #   run: aws cloudfront create-invalidation --distribution-id ${{ vars.CLOUDFRONT_DIST_ID }} --paths "/*"
